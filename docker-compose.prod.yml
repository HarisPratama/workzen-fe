version: '3.8'

services:
  workzen-fe:
    image: ghcr.io/harispratama/workzen-fe:latest
    container_name: workzen-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.workzen.web.id
    networks:
      - workzen-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  workzen-network:
    external: true
