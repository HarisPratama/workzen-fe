name: Deploy to VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: harispratama/workzen-fe

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Starting Frontend Deployment ==="
            
            cd ~/workzen-fe-deploy
            
            # Login to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u harispratama --password-stdin
            
            # Pull latest image
            echo "=== Pulling latest image ==="
            docker pull ghcr.io/harispratama/workzen-fe:latest
            
            # Restart container
            echo "=== Restarting container ==="
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            
            # Verify
            echo "=== Verifying ==="
            sleep 5
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "✓ Frontend is responding on port 3000"
            else
              echo "✗ Frontend not responding"
              docker logs workzen-fe --tail 20
              exit 1
            fi
            
            # Cleanup
            docker image prune -f --filter "until=24h"
            
            echo "=== Frontend Deployment Complete ==="

  notify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Workzen Frontend Deploy Status

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Message:
            ${{ github.event.head_commit.message }}
            
            Status: ${{ job.status }}
